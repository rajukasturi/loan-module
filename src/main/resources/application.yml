server:
  port: ${SERVER_PORT:8080}

# Database Configuration
spring:
  application:
    name: loan-module
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: jdbc:h2:mem:loandb
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: ${HIBERNATE_FORMAT_SQL:true}
        dialect: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:true}
      path: /h2-console
      settings:
        trace: false
        web-allow-others: false

# Logging Configuration
logging:
  level:
    root: ${LOG_LEVEL:INFO}
    com.demo.loan_module: ${APP_LOG_LEVEL:DEBUG}
    org.springframework.web: ${WEB_LOG_LEVEL:INFO}
    org.hibernate: ${HIBERNATE_LOG_LEVEL:INFO}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/loan-module.log

# Swagger/OpenAPI Configuration
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    enabled: ${SWAGGER_ENABLED:true}

# Loan Application Configuration
loan:
  application:
    reference-number-prefix: LOAN
    min-amount: 1000
    max-amount: 10000000
    min-income: 10000
    max-tenure-months: 360
  cibil:
    min-eligible-score: 650
    excellent-score: 800
    good-score: 750
    fair-score: 700
  processing-fee:
    home-loan: 0.01
    personal-loan: 0.02
    car-loan: 0.015
    education-loan: 0.01

# H2 Database Configuration for production profile
---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:h2:file:~/loan-db/loandb
    driver-class-name: org.h2.Driver
    username: sa
    password: ${DB_PASSWORD:}
  h2:
    console:
      enabled: false

logging:
  level:
    root: WARN
    com.demo.loan_module: INFO

server:
  port: ${SERVER_PORT:8080}

---
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
  h2:
    console:
      enabled: false

logging:
  level:
    root: WARN
